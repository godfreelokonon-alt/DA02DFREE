<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MiniRevit 2D - Silicon Valley Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="ribbon">
        <div class="group">
            <span>DESSIN</span>
            <button id="btn-line">Ligne</button>
            <button id="btn-rect">Rectangle</button>
        </div>
        <div class="group">
            <span>ANNOTER</span>
            <button id="btn-text">Texte</button>
            <button id="btn-clear" style="color: #ff4d4d;">Effacer Tout</button>
        </div>
        <div class="group">
            <span>PROJET</span>
            <button id="btn-save">Exporter JSON</button>
        </div>
    </header>

    <main class="workspace">
        <aside class="panel properties">
            <h3>Propriétés</h3>
            <label>Couleur : <input type="color" id="colorPicker" value="#0078d7"></label>
            <label>Taille : <input type="number" id="strokeWeight" value="2" min="1"></label>
            <hr>
            <div id="stats">
                <p>Curseur X: <span id="stat-x">0</span></p>
                <p>Curseur Y: <span id="stat-y">0</span></p>
                <p>Objets: <span id="stat-count">0</span></p>
            </div>
        </aside>

        <section class="canvas-container" style="position: relative; flex: 1; background: #1a1a1a;">
            <canvas id="mainCanvas"></canvas>
            <div id="cmd-bar" style="position: absolute; bottom: 0; left: 0; right: 0; background: #000; color: #00ff00; padding: 8px 15px; font-family: monospace; display: flex; border-top: 1px solid #444;">
                <span style="margin-right: 10px;">>></span>
                <input type="text" id="cmd-input" placeholder="Tapez des coordonnées (x,y) ou une commande..." style="background: transparent; border: none; color: #00ff00; outline: none; flex: 1;">
            </div>
        </section>

        <aside class="panel library">
            <h3>Bibliothèque</h3>
            <div class="lib-item">Porte 90cm</div>
            <div class="lib-item">Fenêtre 120cm</div>
        </aside>
    </main>
    <script src="app.js"></script>
</body>
</html>
