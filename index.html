<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GODFREE RAIL ENGINE - SYNO-QUALITÉ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <header class="ribbon">
            <div class="logo">GODFREE <span>RAIL ENGINE</span></div>
            <div class="config-bar">
                PK Début: <input type="number" id="cfg-origin" value="18000" onchange="app.updateSettings()">
                Échelle: <input type="number" id="cfg-scale" value="10" onchange="app.updateSettings()">
                <button onclick="app.ui.toggleModal()" class="btn-main">+ Nouveau Contrôle</button>
                <button onclick="app.data.clearAll()" class="btn-danger">Effacer Projet</button>
            </div>
        </header>

        <main class="workspace">
            <aside class="panel left-panel">
                <h3>Types de Fiches (Légende)</h3>
                <div id="fiche-legend" class="scrollable"></div>
                <div class="type-creator">
                    <input type="text" id="new-type-name" placeholder="Nom fiche (ex: M240)">
                    <input type="color" id="new-type-color" value="#3498db">
                    <button onclick="app.data.addFicheType()">Ajouter</button>
                </div>
            </aside>

            <section class="viewer" id="viewer-container">
                <canvas id="mainCanvas"></canvas>
                <div id="pk-indicator">PK: ---</div>
            </section>

            <aside class="panel right-panel">
                <h3>Suivi Journalier</h3>
                <div id="reception-feed" class="scrollable"></div>
            </aside>
        </main>

        <footer class="system-console">
            <span class="prompt">SYSTEM_CMD ></span>
            <input type="text" id="cmd-input" placeholder="ZONE [PK_DEBUT] [PK_FIN] [TYPE] [STATUT] [VOIE]">
        </footer>
    </div>

    <div id="form-modal" class="modal">
        <div class="modal-content">
            <h3>Saisie Fiche de Contrôle</h3>
            <select id="m-type"></select>
            <select id="m-voie"><option value="V1">Voie 1 (V1)</option><option value="V2">Voie 2 (V2)</option></select>
            <div class="row"><input type="number" id="m-pks" placeholder="PK Début"><input type="number" id="m-pke" placeholder="PK Fin"></div>
            <select id="m-status">
                <option value="">En attente (Vide)</option>
                <option value="C">Conforme (C - Vert)</option>
                <option value="NC">Non Conforme (NC - Rouge)</option>
                <option value="NR">Non Reçu (NR - Orange)</option>
            </select>
            <div class="modal-actions"><button onclick="app.ui.saveModal()">Valider</button><button onclick="app.ui.toggleModal()">Annuler</button></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
