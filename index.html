<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GODFREE RAIL ENGINE - V1.0 PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <header class="smart-ribbon">
            <div class="brand">GODFREE <span>RAIL ENGINE</span></div>
            <div class="tool-group">
                <button onclick="setTool('rail')">🛤️ Poser Voie</button>
                <button onclick="setTool('jic')">🔗 Joint JIC</button>
                <button onclick="setTool('zone')">🟦 Zone Travaux</button>
            </div>
            <div class="tool-group">
                <input type="file" id="excel-import" style="display:none" onchange="importCSV(this)">
                <button onclick="document.getElementById('excel-import').click()" style="background:#217346; color:white;">📥 Importer CSV/Excel</button>
                <button onclick="exportData()" class="btn-excel">📤 Exporter Fiches</button>
            </div>
        </header>

        <main class="content">
            <aside class="data-sidebar">
                <h3>Suivi Chantier (PK)</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>PK Début</th><th>PK Fin</th><th>Désignation</th><th>Statut</th></tr>
                        </thead>
                        <tbody id="data-body"></tbody>
                    </table>
                </div>
            </aside>

            <section class="viewport">
                <canvas id="mainCanvas"></canvas>
                <div id="tool-helper">Prêt. Utilisez la commande : ZONE [Debut] [Fin] [Type]</div>
                <div id="scu-rail">X+ | Y+ | Z+</div>
            </section>
        </main>

        <footer class="console">
            <span class="prompt">SYSTEM_CMD ></span>
            <input type="text" id="cmd-input" placeholder="Ex: ZONE 18033 18098 M240">
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
