<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GODFREE RAIL ENGINE - Expert System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <header class="smart-ribbon">
            <div class="brand">GODFREE <span>RAIL</span></div>
            <div class="tool-group">
                <button onclick="setTool('line')">Trait</button>
                <button onclick="setTool('rail')" class="btn-rail">🛤️ Poser Rail</button>
                <button onclick="setTool('jic')">🔗 Insérer JIC</button>
            </div>
            <div class="tool-group">
                <select id="unit-select" onchange="updateUnits()">
                    <option value="1">Mètres (m)</option>
                    <option value="100">Centimètres (cm)</option>
                </select>
                <button onclick="exportToExcel()" class="btn-excel">Exporter Fiche Contrôle</button>
            </div>
        </header>

        <main class="content">
            <aside class="data-sidebar">
                <h3>Suivi Qualité (PK)</h3>
                <div class="table-container">
                    <table id="rail-data">
                        <thead>
                            <tr><th>Élément</th><th>PK Début</th><th>PK Fin</th><th>Z</th><th>Statut</th></tr>
                        </thead>
                        <tbody id="data-body"></tbody>
                    </table>
                </div>
            </aside>

            <section class="viewport">
                <canvas id="mainCanvas"></canvas>
                <div id="tool-helper">Prêt pour la pose. Sélectionnez un outil.</div>
                <div id="scu-rail">
                    <div class="axis-x">X</div>
                    <div class="axis-y">Y</div>
                    <div class="axis-z">Z</div>
                </div>
            </section>
        </main>

        <footer class="console">
            <span class="prompt">ENGINE_LOG:</span>
            <input type="text" id="cmd-input" placeholder="Taper commande (ex: RAIL 18004 18940)...">
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
