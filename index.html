<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>RAIL STUDIO EXPERT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <header class="ribbon">
            <div class="logo">GODFREE <span>RAIL ENGINE</span></div>
            <div class="tools">
                <button onclick="ui.openModal()">+ Ajouter Élément</button>
                <button onclick="data.clear()" style="background:#c0392b">🗑️ Reset Complet</button>
            </div>
        </header>

        <main class="content">
            <aside class="sidebar" id="legend">
                <h3>Fiches & Couleurs</h3>
                <div id="fiche-list"></div>
            </aside>

            <section class="viewer">
                <canvas id="canvas"></canvas>
            </section>

            <aside class="sidebar">
                <h3>Contrôles (X pour Suppr)</h3>
                <div id="object-list"></div>
            </aside>
        </main>

        <footer class="console">
            <span>CMD > </span>
            <input type="text" id="cmd" placeholder="ZONE 18033 18098 M240 C V1">
        </footer>
    </div>

    <div id="modal" class="modal">
        <div class="modal-box">
            <h3>Saisie PK</h3>
            <input type="text" id="in-type" placeholder="Type (ex: M240)">
            <input type="number" id="in-pks" placeholder="PK Début">
            <input type="number" id="in-pke" placeholder="PK Fin">
            <select id="in-voie"><option value="V1">V1</option><option value="V2">V2</option></select>
            <select id="in-status">
                <option value="">Statut...</option>
                <option value="C">C (Conforme - Vert)</option>
                <option value="NC">NC (Non Conforme - Rouge)</option>
                <option value="NR">NR (Non Reçu - Orange)</option>
            </select>
            <button onclick="ui.save()">Enregistrer</button>
            <button onclick="ui.closeModal()">Annuler</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
