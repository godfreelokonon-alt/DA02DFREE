<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GODFREE RAIL ENGINE - SYNC PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <header class="smart-ribbon">
            <div class="brand">GODFREE <span>SYNOPTIQUE</span></div>
            
            <div class="tool-group config">
                <label>PK Départ: <input type="number" id="pk-start-cfg" value="18000" onchange="updateProjectSettings()"></label>
                <label>Échelle (px/m): <input type="number" id="pk-scale-cfg" value="10" onchange="updateProjectSettings()"></label>
            </div>

            <div class="tool-group">
                <button onclick="toggleLegendManager()" class="btn-primary">⚙️ Gérer les Fiches</button>
                <button onclick="clearAll()" class="btn-danger">🗑️ Vider Tout</button>
                <button onclick="exportJSON()" class="btn-success">📤 Exporter JSON</button>
            </div>
        </header>

        <main class="content">
            <aside class="sidebar" id="legend-sidebar">
                <h3>Types de Fiches</h3>
                <div id="legend-list"></div>
                <hr>
                <input type="text" id="new-fiche-name" placeholder="Nom nouvelle fiche...">
                <input type="color" id="new-fiche-color" value="#3498db">
                <button onclick="addNewFicheType()">➕ Ajouter Type</button>
            </aside>

            <section class="viewport">
                <canvas id="mainCanvas"></canvas>
                <div id="tool-helper">Utilisez la console pour tracer ou cliquez sur une zone.</div>
            </section>

            <aside class="sidebar" id="inspector-sidebar">
                <h3>Propriétés Réception</h3>
                <div id="inspector-content">
                    <p class="empty-msg">Sélectionnez une zone sur le synoptique...</p>
                </div>
            </aside>
        </main>

        <footer class="console">
            <span class="prompt">COMMANDE ></span>
            <input type="text" id="cmd-input" placeholder="Ex: ZONE 18033 18098 M240 C">
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
