<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GODFREE RAIL STUDIO - EXPERT SYSTEM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <header class="smart-ribbon">
            <div class="brand">GODFREE <span>RAIL STUDIO</span></div>
            <div class="project-params">
                PK Départ: <input type="number" id="pk-start" value="18000" onchange="sync()">
                Échelle: <input type="number" id="scale-val" value="10" onchange="sync()">
            </div>
            <div class="actions">
                <button onclick="openModal('ZONE')" class="btn-tool">+ Zone</button>
                <button onclick="openModal('JIC')" class="btn-tool">+ Point (JIC)</button>
                <button onclick="clearAll()" class="btn-danger">🗑️ Vider Projet</button>
            </div>
        </header>

        <main class="content">
            <aside class="sidebar left">
                <h3>Légende des Fiches</h3>
                <div id="legend-list"></div>
                <div class="add-type-form">
                    <input type="text" id="new-type-name" placeholder="Nom (ex: M240)">
                    <input type="color" id="new-type-color" value="#3498db">
                    <button onclick="addFicheType()">Ajouter Type</button>
                </div>
            </aside>

            <section class="viewport">
                <canvas id="mainCanvas"></canvas>
                <div id="pk-indicator">PK: --- | Voie: ---</div>
            </section>

            <aside class="sidebar right">
                <h3>Suivi de Réception</h3>
                <div id="reception-list"></div>
            </aside>
        </main>

        <footer class="console">
            <span class="prompt">COMMAND_LINE ></span>
            <input type="text" id="cmd-input" placeholder="Ex: ZONE 18033 18098 M240 C V1">
        </footer>
    </div>

    <div id="form-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Nouvel Élément</h3>
            <label>Fiche : <select id="input-type"></select></label>
            <label>Voie : <select id="input-voie"><option value="V1">V1</option><option value="V2">V2</option></select></label>
            <div class="pk-row">
                <label>Début: <input type="number" id="input-pks"></label>
                <label>Fin: <input type="number" id="input-pke"></label>
            </div>
            <label>Statut : 
                <select id="input-status">
                    <option value="">En attente</option>
                    <option value="C">C (Conforme)</option>
                    <option value="NC">NC (Non Conforme)</option>
                    <option value="NR">NR (Non Reçu)</option>
                </select>
            </label>
            <div class="modal-btns">
                <button onclick="saveFromModal()">Valider</button>
                <button onclick="closeModal()" class="btn-cancel">Annuler</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
